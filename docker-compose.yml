version: '3.9'

services:
  # =============================================
  # PostgreSQL Database
  # =============================================
  postgres:
    image: postgres:16-alpine
    container_name: stellar-kyc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stellar_kyc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stellar_kyc_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stellar_kyc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Redis Cache
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: stellar-kyc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # =============================================
  # Backend API
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stellar-kyc-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: stellar_kyc
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-stellar_kyc_secure_pass}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CREDENTIAL_EXPIRY_DAYS: ${CREDENTIAL_EXPIRY_DAYS:-365}
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # Frontend App
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api/v1}
    container_name: stellar-kyc-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # =============================================
  # Nginx Reverse Proxy (production)
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: stellar-kyc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: stellar-kyc-network
